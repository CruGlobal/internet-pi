---
# User configuration.
github_username: ["johnny-hausman", "roguisharcanetrickster", "elephanteleven", "joshAppDev", "therealwizywig"]

# Location where configuration files will be stored.
config_dir: '/scry-pi'

# Domain names configuration (related services need to be enabled).
domain_name_enable: false

# Pi-hole configuration.
pihole_enable: false

# Internet monitoring configuration.
monitoring_enable: true
monitoring_speedtest_interval: 610s
monitoring_speedtest_timeout: 600s
monitoring_ping_interval: 5s
monitoring_ping_hosts:  # [URL];[HUMAN_READABLE_NAME]
  - http://www.google.com/;google.com
  - https://github.com/;github.com
  - https://www.apple.com/;apple.com
  - https://download.windowsupdate.com/;download.windowsupdate.com
  - https://https://signon.okta.com/;signon.okta.com

# Prometheus configuration.
prometheus_monitor_prometheus: false
prometheus_node_exporter_targets:
  - 'nodeexp:9100'
prometheus_extra_scrape_configs: ''
prometheus_tsdb_retention_time: 7d

# Custom Metrics configuration (also requires monitoring_enable).
# custom_metrics_device_id is passed as DEVICE_ID only; not a geo/location field.
custom_metrics_enable: true
custom_metrics_prometheus_url: "http://prometheus:9090"
custom_metrics_device_id: ""

